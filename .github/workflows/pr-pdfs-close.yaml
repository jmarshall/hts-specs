name: Tidy up PDF pull request

on:
  #pull_request_target:  # FIXME do we really need pull_request_target?
  pull_request:
    paths: '*.tex'
    types: [closed]

jobs:
  clean:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write  # FIXME actually it's probably contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      pr_number: ${{ github.event.number }}

    steps:
      - name: Remove preview ref
        continue-on-error: true
        run: |
          gh api --method DELETE repos/$GITHUB_REPOSITORY/git/refs/preview/$pr_number
